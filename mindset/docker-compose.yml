services:
  postgres:
    image: postgres:16
    container_name: ahorro-mindset-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ahorro-mindset
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: